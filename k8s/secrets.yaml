apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: trust-rating
type: Opaque
data:
  # Base64 encoded values
  # To encode: echo -n "your-value" | base64
  supabase-url: <BASE64_ENCODED_SUPABASE_URL>
  supabase-key: <BASE64_ENCODED_SUPABASE_KEY>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  jwt-refresh-secret: <BASE64_ENCODED_JWT_REFRESH_SECRET>
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: trust-rating
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
